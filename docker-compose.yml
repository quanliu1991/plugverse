version: '3.8'

services:
  # PlugVerse 主应用
  plugverse:
    build:
      context: .
      dockerfile: Dockerfile
    image: plugverse:latest
    container_name: plugverse
    ports:
      - "8000:8000"
    volumes:
      # 持久化存储
      - ./output:/app/output
      - ./config:/app/config
      - ./plugins:/app/plugins
      - ./logs:/app/logs
    environment:
      - ENV=production
      - LOG_LEVEL=INFO
      - STORAGE_PATH=/app/output
      - MAX_STORAGE_SIZE=10GB
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - plugverse-network

  # Nginx 反向代理（可选）
  nginx:
    image: nginx:alpine
    container_name: plugverse-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - plugverse
    restart: unless-stopped
    networks:
      - plugverse-network
    profiles:
      - with-nginx

  # Redis（可选，用于任务队列）
  redis:
    image: redis:7-alpine
    container_name: plugverse-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped
    networks:
      - plugverse-network
    profiles:
      - with-redis

  # PostgreSQL（可选，用于数据存储）
  postgres:
    image: postgres:15-alpine
    container_name: plugverse-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: plugverse
      POSTGRES_USER: plugverse
      POSTGRES_PASSWORD: plugverse_password
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - plugverse-network
    profiles:
      - with-postgres

volumes:
  redis-data:
  postgres-data:

networks:
  plugverse-network:
    driver: bridge
